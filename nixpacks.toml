# nixpacks.toml — place in the booking-form repo root (next to server.js / package.json).
#
# Full `puppeteer` downloads its own Chromium during the build; we install the shared
# libraries it links against plus base fonts. Package names target Ubuntu 24.04 "Noble"
# (the six t64-renamed libs use their *t64 names).
#
# PUPPETEER_CACHE_DIR is pinned inside the app dir so the Chromium downloaded at build
# time lives in the same image the app runs from.

[variables]
PUPPETEER_CACHE_DIR = "/app/.cache/puppeteer"

[phases.setup]
aptPkgs = [
  "ca-certificates",
  "fonts-liberation",
  "fonts-dejavu-core",
  "libnss3",
  "libnspr4",
  "libatk1.0-0t64",
  "libatk-bridge2.0-0t64",
  "libcups2t64",
  "libdrm2",
  "libdbus-1-3",
  "libxkbcommon0",
  "libatspi2.0-0t64",
  "libx11-6",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libxcb1",
  "libxshmfence1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2t64",
  "libgtk-3-0t64"
]
